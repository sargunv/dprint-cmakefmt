      - WIN32
      - MACOSX_BUNDLE
      - EXCLUDE_FROM_ALL
      - IMPORTED
      - ALIAS
  add_library:
    pargs: "2+"
    flags:
      - STATIC
      - SHARED
      - MODULE
      - OBJECT
      - INTERFACE
      - UNKNOWN
      - IMPORTED
      - ALIAS
      - EXCLUDE_FROM_ALL
  add_custom_target:
    pargs: "1+"
    flags:
      - ALL
      - VERBATIM
      - USES_TERMINAL
      - COMMAND_EXPAND_LISTS
    kwargs:
      BYPRODUCTS:
        nargs: "*"
      COMMAND:
        nargs: "+"
      COMMENT:
        nargs: 1
      DEPENDS:
        nargs: "*"
      JOB_POOL:
        nargs: 1
      SOURCES:
        nargs: "*"
      WORKING_DIRECTORY:
        nargs: 1
