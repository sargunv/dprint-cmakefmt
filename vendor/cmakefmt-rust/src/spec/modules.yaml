#
# CMake module command spec. Parsed once at startup via
# CommandRegistry::builtins() and merged with builtins.yaml. Each entry
# corresponds to a command defined in a CMake-bundled module that
# becomes available after `include(<Module>)` or
# `find_package(<Module>)` — these are not language builtins and so
# don't appear in `cmake --help-command-list`. Authoritative signature
# source is `cmake --help-module <Module>`.
#
# The formatter applies a spec entry whenever it sees the matching
# command, regardless of whether the relevant module has actually been
# included earlier in the file. In practice this is fine: code that
# calls a module command without including its module wouldn't compile,
# so the spec is only ever applied to genuinely-defined commands.
#
# This file is intentionally separate from builtins.yaml even though
# the runtime merges them — the split mirrors the natural taxonomy
# users already use (CMake language vs CMake bundled modules) and
# keeps builtins.yaml focused on the language surface. Some module
# commands were specced in builtins.yaml during earlier work; those
# will migrate here incrementally as Phase 54 progresses.

commands:
  # from CMake module: ExternalProject
  #
  # Roughly 90 kwargs across the source-fetch, configure, build, install,
  # and test phases. Most accept a single value (directory, bool, or
  # opaque token); the ones that accept argument lists are marked
  # `nargs: "+"`. The handful of mutually-exclusive source-fetch families
  # (URL_*, GIT_*, SVN_*, HG_*, CVS_*, DOWNLOAD_COMMAND) are not
  # validated here — the formatter only cares about layout structure.
  ExternalProject_Add:
    pargs: 1
    kwargs:
      # Directories
      PREFIX:
        nargs: 1
      TMP_DIR:
        nargs: 1
      STAMP_DIR:
        nargs: 1
      LOG_DIR:
        nargs: 1
      DOWNLOAD_DIR:
        nargs: 1
      SOURCE_DIR:
        nargs: 1
      SOURCE_SUBDIR:
        nargs: 1
      BINARY_DIR:
        nargs: 1
      INSTALL_DIR:
        nargs: 1
      LIST_SEPARATOR:
        nargs: 1
      # Download — URL family
      URL:
        nargs: "+"
      URL_HASH:
        nargs: 1
      URL_MD5:
        nargs: 1
      DOWNLOAD_NAME:
        nargs: 1
      DOWNLOAD_NO_EXTRACT:
        nargs: 1
      DOWNLOAD_NO_PROGRESS:
        nargs: 1
      DOWNLOAD_EXTRACT_TIMESTAMP:
        nargs: 1
      TIMEOUT:
        nargs: 1
      INACTIVITY_TIMEOUT:
        nargs: 1
      HTTP_USERNAME:
        nargs: 1
      HTTP_PASSWORD:
        nargs: 1
      HTTP_HEADER:
        nargs: "+"
      TLS_VERSION:
        nargs: 1
      TLS_VERIFY:
        nargs: 1
      TLS_CAINFO:
        nargs: 1
      NETRC:
        nargs: 1
      NETRC_FILE:
        nargs: 1
      # Download — Git family
      GIT_REPOSITORY:
        nargs: 1
      GIT_TAG:
        nargs: 1
      GIT_REMOTE_NAME:
        nargs: 1
      GIT_SUBMODULES:
        nargs: "+"
      GIT_SUBMODULES_RECURSE:
        nargs: 1
      GIT_SHALLOW:
        nargs: 1
      GIT_PROGRESS:
        nargs: 1
      GIT_CONFIG:
        nargs: "+"
      GIT_REMOTE_UPDATE_STRATEGY:
        nargs: 1
      # Download — Subversion family
      SVN_REPOSITORY:
        nargs: 1
      SVN_REVISION:
        nargs: 1
      SVN_USERNAME:
        nargs: 1
      SVN_PASSWORD:
        nargs: 1
      SVN_TRUST_CERT:
        nargs: 1
      # Download — Mercurial family
      HG_REPOSITORY:
        nargs: 1
      HG_TAG:
        nargs: 1
      # Download — CVS family
      CVS_REPOSITORY:
        nargs: 1
      CVS_MODULE:
        nargs: 1
      CVS_TAG:
        nargs: 1
      # Download — explicit override
      DOWNLOAD_COMMAND:
        nargs: "+"
      # Update
      UPDATE_COMMAND:
        nargs: "+"
      UPDATE_DISCONNECTED:
        nargs: 1
      # Patch
      PATCH_COMMAND:
        nargs: "+"
      # Configure
      CONFIGURE_COMMAND:
        nargs: "+"
      CMAKE_COMMAND:
        nargs: 1
      CMAKE_GENERATOR:
        nargs: 1
      CMAKE_GENERATOR_PLATFORM:
        nargs: 1
      CMAKE_GENERATOR_TOOLSET:
        nargs: 1
      CMAKE_GENERATOR_INSTANCE:
        nargs: 1
      CMAKE_ARGS:
        nargs: "+"
      CMAKE_CACHE_ARGS:
        nargs: "+"
      CMAKE_CACHE_DEFAULT_ARGS:
        nargs: "+"
      CONFIGURE_HANDLED_BY_BUILD:
        nargs: 1
      CONFIGURE_ENVIRONMENT_MODIFICATION:
        nargs: "+"
      # Build
      BUILD_COMMAND:
        nargs: "+"
      BUILD_IN_SOURCE:
        nargs: 1
      BUILD_ALWAYS:
        nargs: 1
      BUILD_BYPRODUCTS:
        nargs: "+"
      BUILD_JOB_SERVER_AWARE:
        nargs: 1
      BUILD_ENVIRONMENT_MODIFICATION:
        nargs: "+"
      # Install
      INSTALL_COMMAND:
        nargs: "+"
      INSTALL_BYPRODUCTS:
        nargs: "+"
      INSTALL_JOB_SERVER_AWARE:
        nargs: 1
      INSTALL_ENVIRONMENT_MODIFICATION:
        nargs: "+"
      # Test
      TEST_COMMAND:
        nargs: "+"
      TEST_BEFORE_INSTALL:
        nargs: 1
      TEST_AFTER_INSTALL:
        nargs: 1
      TEST_EXCLUDE_FROM_MAIN:
        nargs: 1
      TEST_ENVIRONMENT_MODIFICATION:
        nargs: "+"
      # Output logging (per step)
      LOG_DOWNLOAD:
        nargs: 1
      LOG_UPDATE:
        nargs: 1
      LOG_PATCH:
        nargs: 1
      LOG_CONFIGURE:
        nargs: 1
      LOG_BUILD:
        nargs: 1
      LOG_INSTALL:
        nargs: 1
      LOG_TEST:
        nargs: 1
      LOG_MERGED_STDOUTERR:
        nargs: 1
      LOG_OUTPUT_ON_FAILURE:
        nargs: 1
      # Terminal access (per step)
      USES_TERMINAL_DOWNLOAD:
        nargs: 1
      USES_TERMINAL_UPDATE:
        nargs: 1
      USES_TERMINAL_PATCH:
        nargs: 1
      USES_TERMINAL_CONFIGURE:
        nargs: 1
      USES_TERMINAL_BUILD:
        nargs: 1
      USES_TERMINAL_INSTALL:
        nargs: 1
      USES_TERMINAL_TEST:
        nargs: 1
      # Target-level
      DEPENDS:
        nargs: "+"
      EXCLUDE_FROM_ALL:
        nargs: 1
      STEP_TARGETS:
        nargs: "+"
      INDEPENDENT_STEP_TARGETS:
        nargs: "+"
      COMMAND:
        nargs: "+"

  # from CMake module: ExternalProject
  ExternalProject_Add_Step:
    pargs: 2
    kwargs:
      COMMAND:
        nargs: "+"
      COMMENT:
        nargs: 1
      DEPENDEES:
        nargs: "+"
      DEPENDERS:
        nargs: "+"
      DEPENDS:
        nargs: "+"
      ENVIRONMENT_MODIFICATION:
        nargs: "+"
      INDEPENDENT:
        nargs: 1
      BYPRODUCTS:
        nargs: "+"
      ALWAYS:
        nargs: 1
      JOB_SERVER_AWARE:
        nargs: 1
      EXCLUDE_FROM_MAIN:
        nargs: 1
      WORKING_DIRECTORY:
        nargs: 1
      LOG:
        nargs: 1
      USES_TERMINAL:
        nargs: 1

  # from CMake module: ExternalProject
  ExternalProject_Add_StepTargets:
    pargs: "2+"
    flags:
      - NO_DEPENDS

  # from CMake module: ExternalProject
  ExternalProject_Add_StepDependencies:
    pargs: "3+"

  # from CMake module: ExternalProject
  ExternalProject_Get_Property:
    pargs: "2+"

  # from CMake module: FetchContent
  #
  # Source-fetch options are a subset of ExternalProject_Add's. The
  # configure/build/install/test phases are explicitly disabled by
  # FetchContent and any options for those phases are silently
  # discarded — for layout purposes that is fine; the formatter still
  # recognises them as kwargs and groups them. SOURCE_SUBDIR is the
  # one configure-related option that is meaningfully accepted.
  FetchContent_Declare:
    pargs: 1
    flags:
      - EXCLUDE_FROM_ALL
      - SYSTEM
      - OVERRIDE_FIND_PACKAGE
    kwargs:
      FIND_PACKAGE_ARGS:
        nargs: "+"
      # Directories
      SOURCE_DIR:
        nargs: 1
      SOURCE_SUBDIR:
        nargs: 1
      BINARY_DIR:
        nargs: 1
      DOWNLOAD_DIR:
        nargs: 1
      # URL family
      URL:
        nargs: "+"
      URL_HASH:
        nargs: 1
      URL_MD5:
        nargs: 1
      DOWNLOAD_NAME:
        nargs: 1
      DOWNLOAD_NO_EXTRACT:
        nargs: 1
      DOWNLOAD_NO_PROGRESS:
        nargs: 1
      DOWNLOAD_EXTRACT_TIMESTAMP:
        nargs: 1
      TIMEOUT:
        nargs: 1
      INACTIVITY_TIMEOUT:
        nargs: 1
      HTTP_USERNAME:
        nargs: 1
      HTTP_PASSWORD:
        nargs: 1
      HTTP_HEADER:
        nargs: "+"
      TLS_VERSION:
        nargs: 1
      TLS_VERIFY:
        nargs: 1
      TLS_CAINFO:
        nargs: 1
      NETRC:
        nargs: 1
      NETRC_FILE:
        nargs: 1
      # Git family
      GIT_REPOSITORY:
        nargs: 1
      GIT_TAG:
        nargs: 1
      GIT_REMOTE_NAME:
        nargs: 1
      GIT_SUBMODULES:
        nargs: "+"
      GIT_SUBMODULES_RECURSE:
        nargs: 1
      GIT_SHALLOW:
        nargs: 1
      GIT_PROGRESS:
        nargs: 1
      GIT_CONFIG:
        nargs: "+"
      GIT_REMOTE_UPDATE_STRATEGY:
        nargs: 1
      # Subversion family
      SVN_REPOSITORY:
        nargs: 1
      SVN_REVISION:
        nargs: 1
      SVN_USERNAME:
        nargs: 1
      SVN_PASSWORD:
        nargs: 1
      SVN_TRUST_CERT:
        nargs: 1
      # Mercurial family
      HG_REPOSITORY:
        nargs: 1
      HG_TAG:
        nargs: 1
      # CVS family
      CVS_REPOSITORY:
        nargs: 1
      CVS_MODULE:
        nargs: 1
      CVS_TAG:
        nargs: 1
      # Explicit override
      DOWNLOAD_COMMAND:
        nargs: "+"
      # Update / patch
      UPDATE_COMMAND:
        nargs: "+"
      UPDATE_DISCONNECTED:
        nargs: 1
      PATCH_COMMAND:
        nargs: "+"

  # from CMake module: FetchContent
  FetchContent_MakeAvailable:
    pargs: "+"

  # from CMake module: FetchContent
  FetchContent_GetProperties:
    pargs: 1
    kwargs:
      SOURCE_DIR:
        nargs: 1
      BINARY_DIR:
        nargs: 1
      POPULATED:
        nargs: 1

  # from CMake module: FetchContent
  FetchContent_Populate:
    pargs: 1
    flags:
      - QUIET
    kwargs:
      SUBBUILD_DIR:
        nargs: 1
      SOURCE_DIR:
        nargs: 1
      BINARY_DIR:
        nargs: 1

  # from CMake module: FetchContent
  FetchContent_SetPopulated:
    pargs: 1
    kwargs:
      SOURCE_DIR:
        nargs: 1
      BINARY_DIR:
        nargs: 1

  # from CMake module: CMakeDependentOption
  cmake_dependent_option:
    pargs: 5

  # from CMake module: CMakePackageConfigHelpers
  configure_package_config_file:
    pargs: 2
    flags:
      - NO_SET_AND_CHECK_MACRO
      - NO_CHECK_REQUIRED_COMPONENTS_MACRO
    kwargs:
      INSTALL_DESTINATION:
        nargs: 1
      PATH_VARS:
        nargs: "+"
      INSTALL_PREFIX:
        nargs: 1
  write_basic_package_version_file:
    pargs: 1
    flags:
      - ARCH_INDEPENDENT
    kwargs:
      VERSION:
        nargs: 1
      COMPATIBILITY:
        nargs: 1
  # CMake's `write_basic_config_version_file()` is the deprecated
  # spelling kept around for backward compatibility — same shape as
  # the modern name above.
  write_basic_config_version_file:
    pargs: 1
    flags:
      - ARCH_INDEPENDENT
    kwargs:
      VERSION:
        nargs: 1
      COMPATIBILITY:
        nargs: 1

  # from CMake module: CMakeParseArguments
  cmake_parse_arguments:
    pargs: "4+"

  # from CMake module: CMakePrintHelpers
  cmake_print_properties:
    pargs: 0
    kwargs:
      TARGETS:
        nargs: "*"
      SOURCES:
        nargs: "*"
      DIRECTORIES:
        nargs: "*"
      TESTS:
        nargs: "*"
      CACHE_ENTRIES:
        nargs: "*"
      PROPERTIES:
        nargs: "+"
  cmake_print_variables:
    pargs: "*"

  # from CMake module: CMakePushCheckState
  cmake_push_check_state:
    pargs: 0
    flags:
      - RESET
  cmake_reset_check_state:
    pargs: 0
  cmake_pop_check_state:
    pargs: 0

  # from CMake module: CheckLanguage
  check_language:
    pargs: 1

  # from CMake module: CheckCompilerFlag (and per-language variants)
  check_compiler_flag:
    pargs: 3
  check_c_compiler_flag:
    pargs: 2
  check_cxx_compiler_flag:
    pargs: 2
  check_fortran_compiler_flag:
    pargs: 2
  check_objc_compiler_flag:
    pargs: 2
  check_objcxx_compiler_flag:
    pargs: 2

  # from CMake modules: CheckIncludeFile, CheckIncludeFileCXX, CheckIncludeFiles
  check_include_file:
    pargs: "2+"
  check_include_file_cxx:
    pargs: "2+"
  check_include_files:
    pargs: "2+"

  # from CMake modules: CheckFunctionExists, CheckLibraryExists,
  # CheckSymbolExists, CheckTypeSize, CheckVariableExists
  check_function_exists:
    pargs: 2
  check_library_exists:
    pargs: 4
  check_symbol_exists:
    pargs: 3
  check_type_size:
    pargs: "2+"
  check_variable_exists:
    pargs: 2

  # from CMake modules: CheckCSourceCompiles, CheckCXXSourceCompiles, etc.
  check_c_source_compiles:
    pargs: 2
    kwargs:
      FAIL_REGEX:
        nargs: "+"
  check_c_source_runs:
    pargs: 2
    kwargs:
      FAIL_REGEX:
        nargs: "+"
  check_cxx_source_compiles:
    pargs: 2
    kwargs:
      FAIL_REGEX:
        nargs: "+"
  check_cxx_source_runs:
    pargs: 2
    kwargs:
      FAIL_REGEX:
        nargs: "+"
  check_fortran_function_exists:
    pargs: 2
  check_fortran_source_compiles:
    pargs: 2
    kwargs:
      FAIL_REGEX:
        nargs: "+"
  check_fortran_source_runs:
    pargs: 2
    kwargs:
      FAIL_REGEX:
        nargs: "+"
  check_objc_source_compiles:
    pargs: 2
    kwargs:
      FAIL_REGEX:
        nargs: "+"
  check_objc_source_runs:
    pargs: 2
    kwargs:
      FAIL_REGEX:
        nargs: "+"
  check_objcxx_source_compiles:
    pargs: 2
    kwargs:
      FAIL_REGEX:
        nargs: "+"
  check_objcxx_source_runs:
    pargs: 2
    kwargs:
      FAIL_REGEX:
        nargs: "+"
  check_source_compiles:
    pargs: 3
    kwargs:
      FAIL_REGEX:
        nargs: "+"
      SRC_EXT:
        nargs: 1
  check_source_runs:
    pargs: 3
    kwargs:
      FAIL_REGEX:
        nargs: "+"
      SRC_EXT:
        nargs: 1

  # from CMake modules: CheckLinkerFlag, CheckCXXSymbolExists,
  # CheckPrototypeDefinition, CheckStructHasMember
  check_linker_flag:
    pargs: 3
  check_cxx_symbol_exists:
    pargs: 3
  check_prototype_definition:
    pargs: 5
  check_struct_has_member:
    pargs: 4
    kwargs:
      LANGUAGE:
        nargs: 1

  # from CMake modules: CheckIPOSupported, CheckPIESupported
  check_ipo_supported:
    pargs: 0
    kwargs:
      RESULT:
        nargs: 1
      OUTPUT:
        nargs: 1
      LANGUAGES:
        nargs: "+"
  check_pie_supported:
    pargs: 0
    kwargs:
      OUTPUT_VARIABLE:
        nargs: 1
      LANGUAGES:
        nargs: "+"

  # from CMake module: CheckCXXCompilerFlag (legacy spelling)
  check_cxx_accepts_flag:
    pargs: 2

  # from CMake module: CMakeFindDependencyMacro
  find_dependency:
    pargs: "1+"
    flags:
      - EXACT
      - QUIET
      - REQUIRED
      - MODULE
      - CONFIG
      - NO_MODULE
      - NO_POLICY_SCOPE
      - BYPASS_PROVIDER
      - GLOBAL
      - UNWIND_INCLUDE
    kwargs:
      COMPONENTS:
        nargs: "+"
      HINTS:
        nargs: "*"
      NAMES:
        nargs: "*"
      OPTIONAL_COMPONENTS:
        nargs: "+"
      PATHS:
        nargs: "*"
      REGISTRY_VIEW:
        nargs: 1
      VERSION:
        nargs: 1

  # from CMake module: FindPackageHandleStandardArgs
  find_package_handle_standard_args:
    pargs: "1+"
    flags:
      - DEFAULT_MSG
      - HANDLE_COMPONENTS
      - CONFIG_MODE
      - NAME_MISMATCHED
      - HANDLE_VERSION_RANGE
    kwargs:
      FOUND_VAR:
        nargs: 1
      REQUIRED_VARS:
        nargs: "+"
      VERSION_VAR:
        nargs: 1
      FAIL_MESSAGE:
        nargs: 1
      REASON_FAILURE_MESSAGE:
        nargs: 1
  find_package_check_version:
    pargs: 2
    flags:
      - HANDLE_VERSION_RANGE
    kwargs:
      RESULT_MESSAGE_VARIABLE:
        nargs: 1
  find_package_message:
    pargs: 3

  # from CMake module: GenerateExportHeader
  generate_export_header:
    pargs: 1
    flags:
      - DEFINE_NO_DEPRECATED
    kwargs:
      BASE_NAME:
        nargs: 1
      EXPORT_FILE_NAME:
        nargs: 1
      EXPORT_MACRO_NAME:
        nargs: 1
      NO_EXPORT_MACRO_NAME:
        nargs: 1
      DEPRECATED_MACRO_NAME:
        nargs: 1
      NO_DEPRECATED_MACRO_NAME:
        nargs: 1
      STATIC_DEFINE:
        nargs: 1
      PREFIX_NAME:
        nargs: 1
      CUSTOM_CONTENT_FROM_VARIABLE:
        nargs: 1
      INCLUDE_GUARD_NAME:
        nargs: 1

  # from CMake module: GoogleTest
  gtest_add_tests:
    pargs: 0
    flags:
      - SKIP_DEPENDENCY
    kwargs:
      TARGET:
        nargs: 1
      SOURCES:
        nargs: "+"
      EXTRA_ARGS:
        nargs: "*"
      WORKING_DIRECTORY:
        nargs: 1
      TEST_PREFIX:
        nargs: 1
      TEST_SUFFIX:
        nargs: 1
      TEST_LIST:
        nargs: 1
  gtest_discover_tests:
    pargs: 1
    flags:
      - NO_PRETTY_TYPES
      - NO_PRETTY_VALUES
    kwargs:
      EXTRA_ARGS:
        nargs: "*"
      WORKING_DIRECTORY:
        nargs: 1
      TEST_PREFIX:
        nargs: 1
      TEST_SUFFIX:
        nargs: 1
      TEST_FILTER:
        nargs: 1
      PROPERTIES:
        nargs: "*"
      TEST_LIST:
        nargs: 1
      DISCOVERY_TIMEOUT:
        nargs: 1
      XML_OUTPUT_DIR:
        nargs: 1
      DISCOVERY_MODE:
        nargs: 1
      DISCOVERY_EXTRA_ARGS:
        nargs: "*"

  # from CMake module: TestBigEndian
  test_big_endian:
    pargs: 1

  # from CMake module: WriteCompilerDetectionHeader
  #
  # Deprecated since CMake 3.20 — kept for backward compatibility.
  write_compiler_detection_header:
    pargs: 0
    flags:
      - ALLOW_UNKNOWN_COMPILERS
      - ALLOW_UNKNOWN_COMPILER_VERSIONS
    kwargs:
      FILE:
        nargs: 1
      PREFIX:
        nargs: 1
      COMPILERS:
        nargs: "+"
      FEATURES:
        nargs: "+"
      BARE_FEATURES:
        nargs: "+"
      VERSION:
        nargs: 1
      PROLOG:
        nargs: 1
      EPILOG:
        nargs: 1

  # from CMake module: ProcessorCount
  processorcount:
    pargs: 1

  # from CMake module: SelectLibraryConfigurations
  select_library_configurations:
    pargs: 1

  # from CMake module: FindPkgConfig
  pkg_check_modules:
    pargs: "2+"
    flags:
