      VERSION:
        nargs: 1
      RELEASE_DATE:
        nargs: 1
      SCRIPT:
        nargs: 1
      PRIORITY:
        nargs: 1
      SORTING_PRIORITY:
        nargs: 1
      DEPENDS:
        nargs: "+"
