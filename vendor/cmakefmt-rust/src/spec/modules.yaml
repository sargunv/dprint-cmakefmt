      RELEASE_DATE:
        nargs: 1
      SCRIPT:
        nargs: 1
      PRIORITY:
        nargs: 1
      SORTING_PRIORITY:
        nargs: 1
      DEPENDS:
        nargs: "+"
      DEPENDENCIES:
        nargs: "+"
      AUTO_DEPEND_ON:
        nargs: "+"
      LICENSES:
        nargs: "+"
      DEFAULT:
