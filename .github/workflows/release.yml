name: Release

on:
  push:
    tags: ["*.*.*"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate release tag
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use bare semver like 0.0.0." >&2
            exit 1
          fi

          cargo_version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)"
          if [[ "$GITHUB_REF_NAME" != "$cargo_version" ]]; then
            echo "Release tag $GITHUB_REF_NAME does not match Cargo.toml version $cargo_version." >&2
            exit 1
          fi

  hygiene:
    name: hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: validate
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-ci-deps
      - run: mise run hygiene

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: validate
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-ci-deps
      - run: mise run test

      - name: Upload plugin Wasm
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dprint-cmakefmt-wasm
          path: target/wasm32-unknown-unknown/release/dprint_cmakefmt.wasm
          if-no-files-found: error

  publish:
    name: publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - hygiene
      - build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download plugin Wasm artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dprint-cmakefmt-wasm
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: dist/dprint_cmakefmt.wasm
